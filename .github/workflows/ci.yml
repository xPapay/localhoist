name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: bash test/e2e.sh
      - name: PHP syntax check (composer package)
        run: |
          for f in packages/laravel/src/*.php; do php -l "$f"; done
