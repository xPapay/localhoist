# Release pipeline: raw binaries (no archives) whose asset names match what
# packages/laravel's BinaryLocator downloads: localhoist-{version}-{os}-{arch}
version: 2

project_name: localhoist

builds:
  - main: ./cmd/localhoist
    binary: localhoist
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [binary]
    name_template: "localhoist-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Signs (Developer ID) and notarizes the darwin binaries via quill — pure
# Go, no macOS runner needed. Dormant until the MACOS_* secrets exist, so
# releases work unsigned before the Apple Developer account is set up.
# One-time credential setup: docs/macos-signing.md
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

# Publishes a cask to github.com/xPapay/homebrew-tap on each release:
# `brew install xPapay/tap/localhoist`. Casks are macOS-only; Linux users
# install via go install or the release binaries directly.
homebrew_casks:
  - name: localhoist
    repository:
      owner: xPapay
      name: homebrew-tap
      branch: main
      git:
        url: "git@github.com:xPapay/homebrew-tap.git"
        private_key: "{{ .Env.HOMEBREW_TAP_DEPLOY_KEY }}"
    homepage: "https://localhoist.io"
    description: "artisan share that actually works — tunnel your local Laravel dev env with Vite HMR, Reverb websockets, and signed URLs working"
    commit_author:
      name: localhoist-release-bot
      email: papay.lukas@gmail.com

changelog:
  use: git
